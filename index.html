<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Note Detector</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e8e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.app { width: 100%; max-width: 680px; padding: 1.5rem 1rem 2rem; }
.topbar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 1rem; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: #444; flex-shrink: 0; }
.dot.on { background: #1D9E75; animation: pulse 1.1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
.status { font-size: 13px; color: #888; }
.noterow { display: flex; align-items: baseline; justify-content: center; gap: 12px; min-height: 72px; margin-bottom: 0.25rem; }
.solname { font-size: 58px; font-weight: 500; line-height: 1; color: #555; transition: color .15s; }
.solname.lit { color: #5B8BF7; }
.sciname { font-size: 22px; color: #666; margin-bottom: 7px; }
svg.sv { display: block; width: 100%; overflow: visible; }
.centsbox { max-width: 360px; margin: 0.5rem auto; }
.centslbl { text-align: center; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px; }
.centstrack { position: relative; height: 6px; background: #2a2a3e; border-radius: 3px; }
.centsctr { position: absolute; left: 50%; top: -4px; height: 14px; width: 1px; background: #444; transform: translateX(-50%); }
.centsndl { position: absolute; top: 50%; width: 10px; height: 10px; border-radius: 50%; background: #555; left: 50%; transform: translate(-50%,-50%); transition: left .11s cubic-bezier(.2,0,.4,1), background .2s; }
.centsndl.green { background: #1D9E75; }
.centsticks { display: flex; justify-content: space-between; margin-top: 4px; }
.centick { font-size: 10px; color: #555; }
.volrow { max-width: 360px; margin: 0.6rem auto; display: flex; align-items: center; gap: 9px; }
.vollbl { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .07em; white-space: nowrap; }
.voltrack { flex: 1; height: 3px; background: #2a2a3e; border-radius: 2px; overflow: hidden; }
.volfill { height: 100%; width: 0%; background: #444; border-radius: 2px; transition: width .05s; }
.btnrow { display: flex; justify-content: center; margin-top: 1.1rem; }
.mbtn { display: flex; align-items: center; gap: 8px; font-size: 14px; padding: 8px 22px; border-radius: 22px; border: 1px solid #444; background: transparent; cursor: pointer; color: #ccc; transition: background .15s, border-color .15s; }
.mbtn:hover { background: #2a2a3e; }
.mbtn.on { background: #3a1a1a; color: #f07070; border-color: #553333; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="dot" id="dot"></div>
    <span class="status" id="status">Press start, then sing a note</span>
  </div>

  <div class="noterow">
    <span class="solname" id="sn">—</span>
    <span class="sciname" id="sc"></span>
  </div>

  <svg class="sv" viewBox="0 0 680 270" role="img">
    <title>Music staff showing detected pitch</title>
    <desc>A treble clef staff. The blue notehead moves to show which note is being sung.</desc>

    <!-- 5 staff lines: bottom=E4(169) G4(153) B4(137) D5(121) top=F5(105) -->
    <line x1="128" x2="600" y1="105" y2="105" stroke="#ccc" stroke-width="1.3" opacity=".5"/>
    <line x1="128" x2="600" y1="121" y2="121" stroke="#ccc" stroke-width="1.3" opacity=".5"/>
    <line x1="128" x2="600" y1="137" y2="137" stroke="#ccc" stroke-width="1.3" opacity=".5"/>
    <line x1="128" x2="600" y1="153" y2="153" stroke="#ccc" stroke-width="1.3" opacity=".5"/>
    <line x1="128" x2="600" y1="169" y2="169" stroke="#ccc" stroke-width="1.3" opacity=".5"/>

    <!-- Subtle note name labels on right margin -->
    <text x="610" y="109"  font-size="11" fill="#444" dominant-baseline="central">Fa₅</text>
    <text x="610" y="125"  font-size="11" fill="#444" dominant-baseline="central">Re₅</text>
    <text x="610" y="141"  font-size="11" fill="#444" dominant-baseline="central">Si₄</text>
    <text x="610" y="157"  font-size="11" fill="#444" dominant-baseline="central">Sol₄</text>
    <text x="610" y="173"  font-size="11" fill="#444" dominant-baseline="central">Mi₄</text>

    <!-- Treble clef -->
    <text x="70" y="198"
          font-family="'Times New Roman','Georgia',serif"
          font-size="158" fill="#ccc" opacity=".7">&#x1D11E;</text>

    <!-- Dynamic note group -->
    <g id="ng" style="opacity:0;transition:opacity .22s">
      <g id="ldg"></g>
      <text id="acc"
            font-family="'Times New Roman',serif"
            font-size="26" text-anchor="end"
            dominant-baseline="central"
            fill="#5B8BF7" x="345" y="137"></text>
      <ellipse id="nh"
               cx="362" cy="137" rx="12.5" ry="8.5"
               transform="rotate(-15,362,137)"
               fill="#5B8BF7"/>
      <line id="stm"
            x1="374" y1="137" x2="374" y2="97"
            stroke="#5B8BF7" stroke-width="1.8"
            stroke-linecap="round"/>
    </g>
  </svg>

  <div class="centsbox">
    <div class="centslbl">Tuning</div>
    <div class="centstrack">
      <div class="centsctr"></div>
      <div class="centsndl" id="cndl"></div>
    </div>
    <div class="centsticks">
      <span class="centick">−50¢</span>
      <span class="centick">in tune</span>
      <span class="centick">+50¢</span>
    </div>
  </div>

  <div class="volrow">
    <span class="vollbl">Vol</span>
    <div class="voltrack"><div class="volfill" id="vf"></div></div>
  </div>

  <div class="btnrow">
    <button class="mbtn" id="mbtn" onclick="toggle()">
      🎤 Start listening
    </button>
  </div>
</div>

<script>
const SVG_NS = 'http://www.w3.org/2000/svg';
const NX   = 362;   // notehead x
const L5Y  = 105;   // top staff line y = F5 = step 8
const SZ   = 8;     // px per diatonic step

function sy(step) { return L5Y + (8 - step) * SZ; }
// sy(8)=105(F5) sy(6)=121(D5) sy(4)=137(B4) sy(2)=153(G4) sy(0)=169(E4)

// Italian fixed-Do solfège
const SOL  = ['Do','Do\u266F','Re','Re\u266F','Mi','Fa','Fa\u266F','Sol','Sol\u266F','La','La\u266F','Si'];
const LET  = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const DIAS = [0,0,1,1,2,3,3,4,4,5,5,6];
const SHRP = [0,1,0,1,0,0,1,0,1,0,1,0];

function noteInfo(freq) {
  const midi = 69 + 12 * Math.log2(freq / 440);
  const rnd  = Math.round(midi);
  const cts  = Math.round((midi - rnd) * 100);
  const idx  = ((rnd % 12) + 12) % 12;
  const oct  = Math.floor(rnd / 12) - 1;
  const step = (oct - 4) * 7 + DIAS[idx] - 2;
  return { sol: SOL[idx], letter: LET[idx].replace('#',''), oct, cts, step, sharp: !!SHRP[idx] };
}

function ledgerSteps(step) {
  const res = [];
  if (step <= -2) {
    const lo = step % 2 === 0 ? step : step + 1;
    for (let s = -2; s >= lo; s -= 2) res.push(s);
  } else if (step >= 10) {
    const hi = step % 2 === 0 ? step : step - 1;
    for (let s = 10; s <= hi; s += 2) res.push(s);
  }
  return res;
}

const ng   = document.getElementById('ng');
const nh   = document.getElementById('nh');
const stm  = document.getElementById('stm');
const acc  = document.getElementById('acc');
const ldg  = document.getElementById('ldg');
const sn   = document.getElementById('sn');
const sc   = document.getElementById('sc');
const cndl = document.getElementById('cndl');
const vf   = document.getElementById('vf');
const dot  = document.getElementById('dot');
const stat = document.getElementById('status');
const mbtn = document.getElementById('mbtn');

let audioCtx, analyser, micSrc, rafId;
let running = false;
let curY   = sy(4);
let smFreq = 0;
let noSig  = 0;

function acf(buf, sr, rms) {
  if (rms < 0.008) return -1;
  const N = buf.length;
  let r1 = 0, r2 = N - 1;
  for (let i = 0; i < N >> 1; i++) { if (Math.abs(buf[i]) < 0.2) { r1 = i; break; } }
  for (let i = 1; i < N >> 1; i++) { if (Math.abs(buf[N-i]) < 0.2) { r2 = N-i; break; } }
  const s = buf.slice(r1, r2);
  const M = s.length;
  if (M < 200) return -1;
  const minLag = Math.max(2, Math.floor(sr / 1300));
  const maxLag = Math.min(M - 2, Math.ceil(sr / 70));
  const c = new Float32Array(maxLag + 1);
  for (let lag = minLag; lag <= maxLag; lag++) {
    let sum = 0, lim = M - lag;
    for (let j = 0; j < lim; j++) sum += s[j] * s[j + lag];
    c[lag] = sum;
  }
  let d = minLag;
  while (d < maxLag - 1 && c[d] > c[d+1]) d++;
  let best = -Infinity, pos = -1;
  for (let i = d; i <= maxLag; i++) { if (c[i] > best) { best = c[i]; pos = i; } }
  if (pos < 1 || pos >= maxLag || best <= 0) return -1;
  const a1 = c[pos-1], a2 = c[pos], a3 = c[pos+1];
  const a = (a1 + a3 - 2*a2) / 2, b = (a3 - a1) / 2;
  const T = a !== 0 ? pos - b/(2*a) : pos;
  return sr / T;
}

function frame() {
  if (!running) return;
  rafId = requestAnimationFrame(frame);
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  let rms = 0;
  for (let i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / buf.length);
  vf.style.width = Math.min(100, rms * 700) + '%';

  const freq = acf(buf, audioCtx.sampleRate, rms);

  if (freq > 70 && freq < 1300) {
    noSig = 0;
    if (smFreq === 0) smFreq = freq;
    const jump = Math.abs(freq - smFreq) / smFreq;
    smFreq = (jump > 0.1 ? 0.5 : 0.18) * freq + (jump > 0.1 ? 0.5 : 0.82) * smFreq;

    const info   = noteInfo(smFreq);
    const cstep  = Math.max(-8, Math.min(18, info.step));
    curY += (sy(cstep) - curY) * 0.28;

    // Ledger lines
    ldg.innerHTML = '';
    ledgerSteps(cstep).forEach(function(s) {
      const ly = sy(s);
      const el = document.createElementNS(SVG_NS, 'line');
      el.setAttribute('x1', NX - 22); el.setAttribute('x2', NX + 22);
      el.setAttribute('y1', ly);      el.setAttribute('y2', ly);
      el.setAttribute('stroke', '#ccc'); el.setAttribute('stroke-width', '1.3');
      el.setAttribute('opacity', '0.5');
      ldg.appendChild(el);
    });

    acc.textContent = info.sharp ? '\u266F' : '';
    if (info.sharp) { acc.setAttribute('x', NX - 16); }

    sn.textContent = info.sol;
    sn.classList.add('lit');
    sc.textContent = info.letter + (info.sharp ? '\u266F' : '') + info.oct;
    cndl.style.left = (50 + info.cts) + '%';
    cndl.classList.toggle('green', Math.abs(info.cts) < 12);
    ng.style.opacity = '1';
  } else {
    noSig++;
    if (noSig > 20) {
      curY += (sy(4) - curY) * 0.05;
      ng.style.opacity = '0';
      sn.textContent = '—'; sn.classList.remove('lit');
      sc.textContent = ''; smFreq = 0;
    }
  }

  nh.setAttribute('cy', curY);
  nh.setAttribute('transform', 'rotate(-15,' + NX + ',' + curY + ')');
  acc.setAttribute('y', curY);

  const approxStep = Math.round((L5Y - curY) / SZ + 8);
  if (approxStep < 4) {
    stm.setAttribute('x1', NX+12); stm.setAttribute('x2', NX+12);
    stm.setAttribute('y1', curY);  stm.setAttribute('y2', curY-52);
  } else {
    stm.setAttribute('x1', NX-12); stm.setAttribute('x2', NX-12);
    stm.setAttribute('y1', curY);  stm.setAttribute('y2', curY+52);
  }
}

async function toggle() {
  if (running) {
    running = false;
    cancelAnimationFrame(rafId);
    if (micSrc) micSrc.disconnect();
    if (audioCtx) audioCtx.close();
    audioCtx = analyser = micSrc = null;
    mbtn.textContent = '🎤 Start listening';
    mbtn.classList.remove('on');
    dot.classList.remove('on');
    stat.textContent = 'Press start, then sing a note';
    ng.style.opacity = '0'; sn.textContent = '—';
    sn.classList.remove('lit'); sc.textContent = '';
    smFreq = 0; curY = sy(4);
  } else {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
        video: false
      });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      micSrc = audioCtx.createMediaStreamSource(stream);
      micSrc.connect(analyser);
      running = true;
      mbtn.textContent = '⏹ Stop';
      mbtn.classList.add('on');
      dot.classList.add('on');
      stat.textContent = 'Listening — sing any note!';
      frame();
    } catch(e) {
      stat.textContent = 'Mic access denied — check browser permissions';
    }
  }
}
</script>
</body>
</html>
